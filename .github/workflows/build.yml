name: Build

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-2022
    permissions:
      contents: write
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore dependency cache
        uses: actions/cache@v4
        with:
          path: .deps
          key: windows-x64-deps-${{ hashFiles('buildspec.json') }}

      - name: Configure
        run: cmake --preset windows-ci-x64

      - name: Build
        run: cmake --build --preset windows-ci-x64

      - name: Install
        run: cmake --install build_x64 --prefix release/RelWithDebInfo --config RelWithDebInfo

      - name: Package
        id: package
        run: |
          $spec    = Get-Content buildspec.json | ConvertFrom-Json
          $name    = $spec.name
          $version = $spec.version
          $zip     = "${name}-${version}-windows-x64.zip"
          Compress-Archive -Path "release/RelWithDebInfo/*" -DestinationPath $zip -Force
          Write-Host "Created $zip"
          echo "zip=$zip" >> $env:GITHUB_OUTPUT
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RoninOBSChat-windows-x64
          path: "*.zip"
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          make_latest: true
          files: ${{ steps.package.outputs.zip }}
          body: |
            Automated build from commit ${{ github.sha }}

      - name: Create Versioned Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.zip }}
          generate_release_notes: true
          make_latest: true
